<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link rel="stylesheet" href="style.css">
  <style>body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; overflow: hidden; }</style>
</head>
<body>
  <bug-graphic></bug-graphic>
  <script type="module">
    import BugGraphic from './graphic.mjs';
    customElements.define('bug-graphic', BugGraphic);
    const el = document.querySelector('bug-graphic');
    await el.load({ data: { label: 'LIVE', sublabel: 'Breaking News' }, renderType: 'realtime', renderCharacteristics: {} });
    await el.playAction({});
  </script>
</body>
</html>
