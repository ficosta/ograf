<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- graphic.mjs injects its own <link rel="stylesheet"> when load() runs. -->
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <bug-graphic></bug-graphic>
  <script type="module">
    import BugGraphic from './graphic.mjs';
    customElements.define('bug-graphic', BugGraphic);
    const el = document.querySelector('bug-graphic');
    window.addEventListener('message', async (e) => {
      const { action, data } = e.data || {};
      if (!action) return;
      switch (action) {
        case 'load':   await el.load({ data: data || { label: 'LIVE', sublabel: 'Breaking News' } }); break;
        case 'play':   await el.playAction({}); break;
        case 'stop':   await el.stopAction({}); break;
        case 'update': await el.updateAction({ data }); break;
      }
    });
    el.load({ data: { label: 'LIVE', sublabel: 'Breaking News' }, renderType: 'realtime', renderCharacteristics: {} });
  </script>
</body>
</html>
