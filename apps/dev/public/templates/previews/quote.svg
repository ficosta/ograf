<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Quote mark -->
  <text x="320" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="80" fill="#2563eb" opacity="0.3">"</text>
  <!-- Quote text -->
  <text x="320" y="170" text-anchor="middle" font-family="Georgia,serif" font-size="18" font-style="italic" fill="white">Open graphics, open broadcast,</text>
  <text x="320" y="198" text-anchor="middle" font-family="Georgia,serif" font-size="18" font-style="italic" fill="white">open standards.</text>
  <!-- Line -->
  <rect x="296" y="222" width="48" height="1.5" fill="#2563eb"/>
  <!-- Attribution -->
  <text x="320" y="250" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">Jane Smith</text>
  <text x="320" y="264" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="500" fill="#60a5fa" letter-spacing="0.5">HEAD OF GRAPHICS</text>
</svg>
