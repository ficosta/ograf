<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link rel="stylesheet" href="style.css">
  <style>body { background: #0f172a; min-height: 100vh; overflow: hidden; }</style>
</head>
<body>
  <quote-graphic></quote-graphic>
  <script type="module">
    import QuoteGraphic from './graphic.mjs';
    customElements.define('quote-graphic', QuoteGraphic);
    const el = document.querySelector('quote-graphic');
    await el.load({ data: { text: "Open graphics, open broadcast, open standards.", author: 'Jane Smith', role: 'Head of Graphics' }, renderType: 'realtime', renderCharacteristics: {} });
    await el.playAction({});
  </script>
</body>
</html>
