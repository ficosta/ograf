<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <weather-card></weather-card>
  <script type="module">
    import WeatherCard from './graphic.mjs';
    customElements.define('weather-card', WeatherCard);

    const el = document.querySelector('weather-card');

    const defaultData = {
      location: 'London',
      temp: '18\u00B0C',
      condition: 'Partly Cloudy',
      icon: '\u26C5',
      forecast: [
        { day: 'Tue', temp: '20\u00B0C', icon: '\u2600\uFE0F' },
        { day: 'Wed', temp: '16\u00B0C', icon: '\uD83C\uDF27\uFE0F' },
        { day: 'Thu', temp: '19\u00B0C', icon: '\u26C5' }
      ]
    };

    window.addEventListener('message', async (e) => {
      const { action, data } = e.data || {};
      if (!action) return;

      switch (action) {
        case 'load':
          await el.load({ data: data || defaultData });
          break;
        case 'play':
          await el.playAction({ delta: 1 });
          break;
        case 'stop':
          await el.stopAction({});
          break;
        case 'update':
          await el.updateAction({ data });
          break;
      }
    });

    el.load({
      data: defaultData,
      renderType: 'realtime',
      renderCharacteristics: { resolution: { width: 1920, height: 1080 } }
    });
  </script>
</body>
</html>
