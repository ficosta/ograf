<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <!-- graphic.mjs injects its own <link rel="stylesheet"> when load() runs. -->
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <ticker-graphic></ticker-graphic>
  <script type="module">
    import TickerGraphic from './graphic.mjs';
    customElements.define('ticker-graphic', TickerGraphic);
    const el = document.querySelector('ticker-graphic');
    await el.load({
      data: {
        badge: 'Breaking',
        items: [
          'EBU releases OGraf v1 — the open standard for broadcast graphics',
          'SPX Graphics adds full OGraf compliance in v1.4',
          'CasparCG community explores native OGraf integration',
          'Loopic announces one-click OGraf export'
        ]
      },
      renderType: 'realtime',
      renderCharacteristics: {}
    });
    await el.playAction({});
  </script>
</body>
</html>
