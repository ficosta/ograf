<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <breaking-news></breaking-news>
  <script type="module">
    import BreakingNews from './graphic.mjs';

    const el = document.querySelector('breaking-news');

    window.addEventListener('message', async (e) => {
      const { action, data } = e.data || {};
      if (!action) return;

      switch (action) {
        case 'load':
          await el.load({ data: data || { headline: 'EBU announces OGraf v2 roadmap for 2027' } });
          break;
        case 'play':
          await el.playAction({ delta: 1 });
          break;
        case 'stop':
          await el.stopAction({});
          break;
        case 'update':
          await el.updateAction({ data });
          break;
      }
    });

    el.load({
      data: { headline: 'EBU announces OGraf v2 roadmap for 2027' },
      renderType: 'realtime',
      renderCharacteristics: { resolution: { width: 1920, height: 1080 } }
    });
  </script>
</body>
</html>
