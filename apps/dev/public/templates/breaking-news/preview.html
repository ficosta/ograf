<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link rel="stylesheet" href="style.css">
  <style>body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; overflow: hidden; }</style>
</head>
<body>
  <breaking-news></breaking-news>
  <script type="module">
    import BreakingNews from './graphic.mjs';
    customElements.define('breaking-news', BreakingNews);
    const el = document.querySelector('breaking-news');
    await el.load({ data: { headline: 'EBU announces OGraf v2 roadmap for 2027' }, renderType: 'realtime', renderCharacteristics: {} });
    await el.playAction({ delta: 1 });
  </script>
</body>
</html>
